    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Brain, Activity, Zap, CheckCircle2, RotateCcw, 
            Lock, Clock, Flame, ChevronRight, AlertTriangle, 
            X, Play, Pause, RefreshCw,
            Plus, Edit3, Trash2, Save, MoreHorizontal,

        // --- DATABASE SYSTEM (INDEXEDDB) ---
        class CorthonDB {
            constructor() {
                this.dbName = 'CorthonOS_DB';
                this.storeName = 'neural_data';
                this.version = 1;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            db.createObjectStore(this.storeName, { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this.db);
                    };
                    request.onerror = (event) => reject(event.target.error);
                });
            }

            async save(key, data) {
                if (!this.db) await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.put({ id: key, value: data, timestamp: Date.now() });
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }

            async load(key) {
                if (!this.db) await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readonly');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result ? request.result.value : null);
                    request.onerror = () => reject(request.error);
                });
            }

            async clearAll() {
                 if (!this.db) await this.init();
                 return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.clear();
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                 });
            }
        }

        const neuralDB = new CorthonDB();

        // --- PROFESSIONAL AUDIO SYSTEM ---
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const playTone = (freq, type, startTime, duration, vol = 0.1) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(vol, startTime + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };

                if (type === 'complete' || type === 'success') {
                    playTone(880.00, 'sine', now, 0.6, 0.1);      
                    playTone(1108.73, 'sine', now + 0.05, 0.6, 0.1); 
                    playTone(1318.51, 'sine', now + 0.10, 0.8, 0.1); 
                } 
                else if (type === 'click') { playTone(1200, 'sine', now, 0.05, 0.02); } 
                else if (type === 'boot') {
                    playTone(220, 'square', now, 0.1, 0.05);
                    playTone(440, 'square', now + 0.1, 0.1, 0.05);
                    playTone(880, 'square', now + 0.2, 0.3, 0.05);
                }
                else if (type === 'purge' || type === 'lazy') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.3);
                }
                else if (type === 'warning') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.linearRampToValueAtTime(200, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.2);
                }
                else if (type === 'mercy') { playTone(440, 'sine', now, 0.5, 0.05); }
                else if (type === 'unlock') {
                    playTone(1046.50, 'sine', now, 0.2, 0.05);
                    playTone(1318.51, 'sine', now + 0.1, 0.4, 0.1);
                    playTone(1567.98, 'sine', now + 0.2, 0.6, 0.1);
                }
            } catch (e) { console.error(e); }
        };

        // --- CONSTANTS & CONFIG ---
        const XP_DIFFICULTY_SCALAR = 3500; 

        // Unvan Sistemi (Tech Noir / Neuro-Perception Ontology tabanlı)
        const TITLES = [
            { level: 1, name: "Apatik Gözlemci" },
            { level: 5, name: "Reaktif Algı" },
            { level: 10, name: "Proaktif Ajan" },
            { level: 15, name: "Siber-İrade Korsanı" },
            { level: 25, name: "Nöro-Mimar" },
            { level: 40, name: "Sinestezik Üstat" },
            { level: 60, name: "Corthon Prime" }
        ];

        const getTitle = (level) => {
            let currentTitle = TITLES[0].name;
            for(let i=0; i<TITLES.length; i++){
                if(level >= TITLES[i].level) currentTitle = TITLES[i].name;
            }
            return currentTitle;
        };

        const MOTIVATION_QUOTES = [
            "Kaos, sadece anlaşılmamış bir düzendir.",
            "Yönetemediğin şeyi ölçemezsin.",
            "Bugün ektiğin tohumlar, yarınki gölgeni oluşturur.",
            "Dopamin bir ödül değil, bir yakıttır. Doğru yere harca.",
            "Mükemmellik bir eylem değil, bir alışkanlıktır.",
            "İrade, beynin mimarisidir.",
            "Sistem, kaosun tek ilacıdır."
        ];

        const DAYS = [
            { id: 1, name: 'Pazartesi', short: 'Pzt' },
            { id: 2, name: 'Salı', short: 'Sal' },
            { id: 3, name: 'Çarşamba', short: 'Çar' },
            { id: 4, name: 'Perşembe', short: 'Per' },
            { id: 5, name: 'Cuma', short: 'Cum' },
            { id: 6, name: 'Cumartesi', short: 'Cmt' },
            { id: 0, name: 'Pazar', short: 'Paz' },
        ];

        const CATEGORIES = ['İş/Proje', 'Spor', 'Gelişim', 'Sağlık', 'Sosyal', 'Tasarım', 'Diğer'];
        
        const SNOOZE_REASONS = [
            { id: 'LAZY', label: 'Üşengeçlik', penalty: 500, color: 'text-red-500', bg: 'bg-red-500/10', border: 'border-red-500/20', icon: Coffee },
            { id: 'TIRED', label: 'Yorgunluk', penalty: 150, color: 'text-orange-400', bg: 'bg-orange-400/10', border: 'border-orange-400/20', icon: Battery },
            { id: 'BUSY', label: 'Yoğunluk', penalty: 100, color: 'text-blue-400', bg: 'bg-blue-400/10', border: 'border-blue-400/20', icon: Briefcase },
            { id: 'EMERGENCY', label: 'Acil Durum', penalty: 0, color: 'text-corthon-cyan', bg: 'bg-corthon-cyan/10', border: 'border-corthon-cyan/20', icon: AlertOctagon },
        ];

        const MACRO_AXES = {
            'ÜRETİM': ['İş/Proje', 'Gelişim', 'Tasarım'],
            'FİZİKSEL': ['Spor', 'Sağlık'],
            'SOSYAL': ['Sosyal'],
            'DİĞER': ['Diğer']
        };

        // Görev Tipleri (Zorunlu, Standart, Zevk/Ödül)
        const TASK_TYPES = [
            { id: 'CHALLENGE', label: 'Zorunlu (Kortizol)', xp: 150, color: 'text-red-400', desc: 'Zor ama gerekli.' },
            { id: 'NEUTRAL', label: 'Standart İşlem', xp: 75, color: 'text-gray-300', desc: 'Günlük rutin.' },
            { id: 'REWARD', label: 'Zevk (Dopamin)', xp: 50, color: 'text-corthon-cyan', desc: 'Sadece hak edildiğinde açılır.' },
        ];

        const DAILY_XP_UNLOCK_THRESHOLD = 300; // Zevk görevlerini açmak için o gün toplanması gereken minimum XP

        const generateInitialRoutine = () => {
            const routine = {};
            DAYS.forEach(day => {
                const dayTasks = [];
                if (day.id === 1) {
                    dayTasks.push({ 
                        id: 'sample_task_1', 
                        title: 'Derin Çalışma Bloğu', 
                        category: 'İş/Proje', 
                        timeBound: true,
                        time: '09:00', 
                        completed: false, 
                        snoozed: 0, 
                        snoozePenalty: 0,
                        type: 'CHALLENGE', 
                        note: 'En zorlu görevi sabah hallet.' 
                    });
                    dayTasks.push({ 
                        id: 'sample_task_2', 
                        title: 'Marvel Sezon İzle', 
                        category: 'Diğer', 
                        timeBound: false,
                        time: '', 
                        completed: false, 
                        snoozed: 0, 
                        snoozePenalty: 0,
                        type: 'REWARD', 
                        note: 'Önce zorunlu görevleri tamamla ve kilidi aç.' 
                    });
                }
                routine[day.id] = dayTasks;
            });
            return routine;
        };

        // --- BACKGROUND WORKER CODE (BLOB) ---
        const backgroundWorkerCode = `
        self.tasks = {};
        self.sentNotifications = {};

        self.onmessage = function(e) {
            if (e.data.type === 'UPDATE_SCHEDULE') {
                self.tasks = e.data.payload;
            }
            if (e.data.type === 'SYNC_SENT_LOG') {
                self.sentNotifications = e.data.payload;
            }
        };

        setInterval(() => {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const timeStr = \`\${hours}:\${minutes}\`;
            
            const dayId = now.getDay();
            const dateStr = now.toISOString().split('T')[0];
            
            const todayTasks = self.tasks[dayId] || [];

            todayTasks.forEach(task => {
                if (task.completed || !task.timeBound) return;
                
                const key = dateStr + '-' + task.id + '-' + timeStr;
                
                if (task.time === timeStr && !self.sentNotifications[key]) {
                    self.sentNotifications[key] = true;
                    self.postMessage({
                        type: 'TRIGGER_NOTIFICATION',
                        title: 'Protokol Zamanı: ' + task.title,
                        body: task.note || "Harekete geç.",
                        key: key
                    });
                }
            });
        }, 10000); // Check every 10 seconds to save battery
        `;

        // --- COMPONENTS ---

        const CorthonLogo = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="text-corthon-cyan animate-pulse-slow">
                <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M12 6V12L16 14" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="12" cy="12" r="2" fill="currentColor"/>
            </svg>

        const PermissionModal = ({ onGrant, onSkip, isIOS }) => {
            return (

                    <div className="max-w-sm w-full bg-[#1a1a1c] border border-corthon-cyan/50 rounded-2xl p-6 text-center relative overflow-hidden shadow-[0_0_50px_rgba(185,133,81,0.2)]">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-corthon-cyan to-transparent animate-pulse"></div>
                        
                        <Bell size={48} className="mx-auto text-corthon-cyan mb-4 animate-bounce" />

                        <p className="text-gray-400 text-sm mb-4 leading-relaxed">

                        </p>

                        {isIOS && (
                            <div className="bg-red-500/10 border border-red-500/20 rounded-xl p-3 mb-6 text-left">
                                <div className="flex items-center gap-2 text-red-400 font-bold text-xs mb-1">
                                    <Smartphone size={14}/> iOS Kullanıcısı Uyarısı
                                </div>
                                <p className="text-[10px] text-gray-300">
                                    iPhone'da bildirim alabilmek için önce alt menüden <strong>"Ana Ekrana Ekle" (Add to Home Screen)</strong> yapmalı ve uygulamayı oradan açmalısın.
                                </p>
                            </div>
                        )}

                        <div className="space-y-3 mt-4">
                            <button 
                                onClick={onGrant}
                                className="w-full py-4 bg-corthon-emerald text-black font-bold rounded-xl hover:bg-opacity-90 transition-all shadow-lg shadow-corthon-emerald/30 flex items-center justify-center gap-2"
                            >
                                <Zap size={18} fill="black" /> BAĞLANTIYI KUR
                            </button>
                            <button 
                                onClick={onSkip}
                                className="text-xs text-gray-500 hover:text-gray-300 underline"
                            >
                                Manuel Modda Devam Et
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const TutorialOverlay = ({ step, onNext, onSkip }) => {
            if (step === 0) return null;

            const steps = [
                { id: 1, text: "Corthon Neural OS'a hoş geldin. Bu bir to-do listesi değil; nörolojik döngünü yöneten, dikkatini hizada tutan bir irade motorudur.", target: "CENTER" },
                { id: 2, text: "STATÜ & UNVAN: Sadece seviye atlamazsın, siber-ontolojik unvanlar kazanırsın. Bakır çubuk dopamin döngünü temsil eder.", target: "STATS" },
                { id: 3, text: "GÜN NAVİGASYONU: Zaman körlüğünü önlemek için günleri net bir akışta gör. Gelecek sadece planlanır, geçmiş ise raporlanır.", target: "DAYS" },
                { id: 4, text: "PROTOKOL GİRİŞİ: (+)'ya bas. Artık görevleri 'Zamansız' yapabilir veya onlara 'Ödül' kilidi koyabilirsin.", target: "ADD_BTN" },
                { id: 5, text: "GÜN SONU KİLİDİ: Gerçekleşen eylemlerle günü mühürle. %80+ verim ciddi XP bonusu verir.", target: "COMPLETE_BTN" },
                { id: 6, text: "PERFORMANS PANELİ: Disiplin sızıntılarını (neden ertelediğini) yüzüne vuran analitik ekranı.", target: "MENU" }
            ];

            const current = steps.find(s => s.id === step);
            if (!current) return null;

            return (
                <div className="tutorial-overlay-container flex flex-col items-center justify-center p-6 animate-fade-in" onClick={(e) => { e.stopPropagation(); onNext(); }}>
                    <div className={`
                        max-w-xs w-full bg-[#1a1a1c] border border-corthon-cyan shadow-[0_0_30px_rgba(185,133,81,0.2)] rounded-2xl p-6 relative z-[70] transition-all duration-500
                        ${step === 1 ? 'scale-100' : 'scale-95 translate-y-10'}
                        ${step === 4 ? 'absolute bottom-32 right-6' : ''}
                        ${step === 5 ? 'absolute bottom-24 left-1/2 -translate-x-1/2' : ''}
                        ${step === 6 ? 'absolute top-20 left-1/2 -translate-x-1/2' : ''}
                    `}>
                        <div className="absolute -top-3 -left-3 bg-[#232325] border border-corthon-cyan text-corthon-cyan text-[10px] font-bold px-2 py-0.5 rounded">TUTORIAL_MODE_v2</div>
                        
                        <div className="flex items-start gap-3 mb-4">
                            <div className="w-8 h-8 rounded-full bg-corthon-cyan/20 flex items-center justify-center border border-corthon-cyan/50 shrink-0 animate-float">
                                <Terminal size={14} className="text-corthon-cyan"/>
                            </div>
                            <div>
                                <h3 className="text-corthon-cyan font-bold text-sm tracking-wider mb-1">EĞİTİM PROTOKOLÜ {step}/6</h3>
                                <p className="text-xs text-gray-300 leading-relaxed font-mono">{current.text}</p>
                            </div>
                        </div>

                        <div className="flex justify-between items-center mt-2">
                            <button onClick={(e) => { e.stopPropagation(); onSkip(); }} className="text-[10px] text-gray-500 hover:text-white underline">Atla</button>
                            <div className="flex items-center gap-2 text-[10px] text-corthon-cyan animate-pulse">
                                <span>DEVAM ET</span> <ChevronRight size={12}/>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BootScreen = ({ onComplete }) => {
            const [step, setStep] = useState(0);
            
            useEffect(() => {
                const timers = [
                    setTimeout(() => setStep(1), 500),
                    setTimeout(() => setStep(2), 1200),
                    setTimeout(() => setStep(3), 2000),
                    setTimeout(() => { playSound('boot'); onComplete(); }, 2800)
                ];
                return () => timers.forEach(clearTimeout);
            }, []);

            return (
                <div className="fixed inset-0 z-[200] bg-[#232325] flex flex-col items-center justify-center p-8 font-mono">
                    <div className="w-full max-w-sm">
                        <div className="flex justify-center mb-8 relative">
                             <div className="absolute inset-0 bg-corthon-cyan/20 blur-xl rounded-full animate-pulse"></div>
                             <CorthonLogo />
                        </div>
                        
                        <div className="space-y-2 mb-8 h-32 text-xs text-corthon-cyan/80">
                            {step >= 0 && <div className="animate-slide-up">> BAŞLATILIYOR: CORTHON_NEURAL_CORE...</div>}
                            {step >= 1 && <div className="animate-slide-up">> VERİTABANI BAĞLANTISI: [OK]</div>}
                            {step >= 1 && <div className="animate-slide-up">> SİNESTEZİK ARAYÜZ YÜKLENİYOR...</div>}
                            {step >= 2 && <div className="animate-slide-up">> DOPAMİN RESEPTÖRLERİ: AKTİF</div>}
                            {step >= 2 && <div className="animate-slide-up text-white font-bold">> SİSTEM HAZIR.</div>}
                        </div>

                        <div className="h-1 w-full bg-[#151516] rounded-full overflow-hidden">
                            <div 
                                className="h-full bg-corthon-emerald transition-all duration-[2000ms] ease-out shadow-[0_0_10px_rgba(196,141,90,0.5)]"
                                style={{ width: step === 3 ? '100%' : step === 0 ? '0%' : '60%' }}
                            ></div>
                        </div>
                    </div>
                </div>
            );
        };

        const Greeting = ({ name }) => {
            const hour = new Date().getHours();
            let greet = "Sistem Çevrimiçi";
            let icon = <Sun size={20} className="text-yellow-500" />;
            
            if (hour < 6) { greet = "Siber Gece"; icon = <Moon size={20} className="text-purple-400" />; }
            else if (hour < 11) { greet = "Sabah Protokolü"; icon = <Sunrise size={20} className="text-orange-400" />; }
            else if (hour > 18) { greet = "Akşam Özeti"; icon = <Sunset size={20} className="text-corthon-cyan" />; }

            const randomQuote = useMemo(() => MOTIVATION_QUOTES[Math.floor(Math.random() * MOTIVATION_QUOTES.length)], []);

            return (
                <div className="mb-6 animate-fade-in">
                    <div className="flex items-center gap-2 mb-2 text-corthon-muted font-medium text-sm">
                        {icon}
                        <span>{greet}</span>
                    </div>
                    <div className="text-sm text-gray-400 italic font-serif opacity-80 border-l-2 border-corthon-cyan pl-3">
                        "{randomQuote}"
                    </div>
                </div>
            );
        };

        const SnoozeModal = ({ isOpen, onClose, task, onConfirm, onReschedule, onUndo }) => {
            const [mode, setMode] = useState('REASON');

            if (!isOpen || !task) return null;

            return (
                <div className="fixed inset-0 z-[120] flex items-end sm:items-center justify-center">
                    <div className="absolute inset-0 modal-overlay" onClick={onClose}></div>
                    <div className="relative w-full max-w-lg bg-[#1a1a1c] border-t sm:border border-corthon-cyan/20 rounded-t-2xl sm:rounded-2xl p-6 animate-slide-up safe-area-bottom shadow-2xl">
                        
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h3 className="font-bold text-lg text-white flex items-center gap-2">
                                    <AlertTriangle size={20} className="text-corthon-warning"/>
                                    İrade Sorgulaması
                                </h3>
                                <p className="text-xs text-gray-400 mt-1 font-mono">"{task.title}" neden yapılmadı?</p>
                            </div>
                            <button onClick={onClose}><X size={20} className="text-gray-500 hover:text-white"/></button>
                        </div>

                        {task.snoozed > 0 && (
                            <div className="mb-6">
                                <button 
                                    onClick={onUndo}
                                    className="w-full py-4 bg-corthon-cyan/20 border-2 border-corthon-cyan text-corthon-cyan rounded-xl flex items-center justify-center gap-2 text-sm font-bold hover:bg-corthon-cyan/30 transition-all shadow-[0_0_15px_rgba(185,133,81,0.2)]"
                                >
                                    <RotateCcw size={18}/> GERİ AL VE XP'Yİ KURTAR
                                </button>
                                <div className="text-[10px] text-center text-gray-500 mt-2 uppercase tracking-wide">Bu görev {task.snoozed} kez ötelendi.</div>
                            </div>
                        )}

                        <div className="flex bg-[#151516] p-1 rounded-xl mb-6">
                            <button onClick={() => setMode('REASON')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${mode === 'REASON' ? 'bg-[#232325] text-white shadow' : 'text-gray-500'}`}>ERTELE (BUGÜN)</button>
                            <button onClick={() => setMode('SCHEDULE')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${mode === 'SCHEDULE' ? 'bg-[#232325] text-white shadow' : 'text-gray-500'}`}>ÖTELE (TAŞI)</button>
                        </div>

                        {mode === 'REASON' && (
                            <div className="grid grid-cols-2 gap-3">
                                {SNOOZE_REASONS.map(reason => (
                                    <button 
                                        key={reason.id}
                                        onClick={() => onConfirm(reason)}
                                        className={`p-4 rounded-xl border flex flex-col items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-95 ${reason.bg} ${reason.border}`}
                                    >
                                        <reason.icon size={24} className={reason.color} />
                                        <span className={`text-xs font-bold ${reason.color}`}>{reason.label}</span>
                                        <span className="text-[10px] bg-black/40 px-2 py-0.5 rounded text-white/70 font-mono">
                                            {reason.penalty > 0 ? `-${reason.penalty} XP` : 'Ceza Yok'}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        )}

                        {mode === 'SCHEDULE' && (
                            <div className="space-y-4">
                                <p className="text-xs text-gray-400 text-center">Görevi başka bir güne taşıyorsun. Bu bir planlama hatasıdır ve -250 XP bedeli vardır.</p>
                                <div className="grid grid-cols-3 gap-2">
                                    {DAYS.filter(d => d.id !== 0 && d.id !== new Date().getDay()).slice(0, 6).map(d => (
                                        <button 
                                            key={d.id}
                                            onClick={() => onReschedule(d.id)}
                                            className="p-3 bg-[#151516] border border-white/5 hover:border-corthon-cyan/50 hover:bg-corthon-cyan/5 rounded-xl text-sm text-gray-300 hover:text-white transition-all flex flex-col items-center group"
                                        >
                                            <span className="font-bold group-hover:text-corthon-cyan transition-colors">{d.short}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const TaskEditor = ({ isOpen, onClose, onSave, onDelete, initialData }) => {
            const [title, setTitle] = useState('');
            const [note, setNote] = useState('');
            const [category, setCategory] = useState('İş/Proje');
            const [timeBound, setTimeBound] = useState(true);
            const [time, setTime] = useState('09:00');
            const [type, setType] = useState('NEUTRAL');

            useEffect(() => {
                if (isOpen) {
                    setTitle(initialData?.title || '');
                    setNote(initialData?.note || '');
                    setCategory(initialData?.category || 'İş/Proje');
                    setTimeBound(initialData?.timeBound !== undefined ? initialData.timeBound : true);
                    setTime(initialData?.time || '09:00');
                    setType(initialData?.type || 'NEUTRAL');
                }
            }, [isOpen, initialData]);

            const handleSubmit = (e) => {
                e.preventDefault(); 
                if (title) {
                    onSave({ title, note, category, timeBound, time: timeBound ? time : '', type });
                }
            };
            
            const handleDelete = (e) => {
                e.preventDefault(); e.stopPropagation();
                if (initialData && initialData.id) onDelete(initialData.id);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[110] flex items-end sm:items-center justify-center">
                    <div className="absolute inset-0 modal-overlay" onClick={onClose}></div>
                    <form onSubmit={handleSubmit} className="relative w-full max-w-lg bg-[#1a1a1c] border-t sm:border border-corthon-cyan/20 rounded-t-2xl sm:rounded-2xl p-6 transform transition-transform duration-300 animate-slide-up safe-area-bottom shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-lg text-white">{initialData ? 'Protokolü Düzenle' : 'Yeni Protokol'}</h3>
                            <button type="button" onClick={onClose}><X size={20} className="text-gray-500 hover:text-white"/></button>
                        </div>
                        <div className="space-y-5">
                            <div><input value={title} onChange={(e) => setTitle(e.target.value)} className="w-full bg-transparent text-2xl font-bold placeholder-gray-600 outline-none text-white border-b border-transparent focus:border-corthon-cyan transition-colors pb-2" placeholder="Ne başaracaksın?" autoFocus /></div>
                            
                            {/* Type Selector */}
                            <div className="grid grid-cols-3 gap-2">
                                {TASK_TYPES.map(t => (
                                    <button 
                                        type="button" 
                                        key={t.id} 
                                        onClick={() => setType(t.id)}
                                        className={`p-3 rounded-xl border flex flex-col items-center justify-center text-center transition-all ${type === t.id ? `bg-[#232325] border-${t.color.split('-')[1]}-500 shadow-inner` : 'bg-transparent border-white/5 hover:bg-white/5'}`}
                                    >
                                        <span className={`text-[11px] font-bold ${t.color}`}>{t.label}</span>
                                        <span className="text-[9px] text-gray-500 mt-1 hidden sm:block">{t.desc}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="flex gap-3 items-center bg-[#151516] p-2 rounded-xl border border-white/5">
                                <label className="flex items-center gap-2 cursor-pointer flex-1 pl-2">
                                    <div className="relative">
                                        <input type="checkbox" className="sr-only toggle-checkbox" checked={timeBound} onChange={() => setTimeBound(!timeBound)} />
                                        <div className={`block w-10 h-6 rounded-full transition-colors ${timeBound ? 'bg-corthon-cyan' : 'bg-gray-700'}`}></div>
                                        <div className={`absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${timeBound ? 'translate-x-4' : 'translate-x-0'}`}></div>
                                    </div>
                                    <span className="text-sm text-gray-300 font-medium">Zamana Bağlı</span>
                                </label>
                                
                                {timeBound ? (
                                    <div className="bg-[#232325] rounded-lg p-2 flex items-center gap-2 border border-white/10">
                                        <Clock size={16} className="text-corthon-cyan"/>
                                        <input type="time" value={time} onChange={(e) => setTime(e.target.value)} className="bg-transparent w-full outline-none text-sm font-mono text-white"/>
                                    </div>
                                ) : (
                                    <div className="bg-[#232325] rounded-lg p-2 px-4 flex items-center gap-2 border border-white/10 text-gray-500 text-sm">
                                        <Sparkles size={16}/> Zamansız
                                    </div>
                                )}
                            </div>

                            <div className="flex flex-wrap gap-2 py-1">
                                {CATEGORIES.map(c => (
                                    <button type="button" key={c} onClick={() => setCategory(c)} className={`text-xs px-3 py-1.5 rounded-full border transition-all ${category === c ? 'bg-corthon-cyan text-black border-corthon-cyan font-bold' : 'bg-[#151516] text-gray-400 border-white/5 hover:border-white/20'}`}>{c}</button>
                                ))}
                            </div>
                            <div className="bg-[#151516] rounded-xl p-4 border border-white/5 focus-within:border-corthon-cyan transition-colors">
                                <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="Notlar, alt adımlar veya tasarım fikirleri..." className="w-full bg-transparent outline-none text-sm min-h-[80px] resize-none placeholder-gray-600 text-gray-300 font-sans leading-relaxed"/>
                            </div>
                            <div className="pt-4 flex flex-col gap-3">
                                <button type="submit" disabled={!title} className="w-full p-4 bg-corthon-emerald text-black font-bold rounded-xl hover:bg-opacity-90 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2 transition-all shadow-lg shadow-corthon-emerald/20">
                                    <Save size={18} /> {initialData ? 'Değişiklikleri Kaydet' : 'Protokolü Entegre Et'}
                                </button>
                                {initialData && (
                                    <button type="button" onClick={handleDelete} className="w-full p-4 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white border border-red-500/20 flex justify-center items-center gap-2 font-bold transition-all group">
                                        <Trash2 size={18} className="group-hover:animate-bounce"/> Görevi Sil
                                    </button>
                                )}
                            </div>
                        </div>
                    </form>
                </div>
            );
        };

        const App = () => {
            const [mounted, setMounted] = useState(false);
            const [xp, setXp] = useState(0);
            const [streak, setStreak] = useState(0);
            const [selectedDayId, setSelectedDayId] = useState(new Date().getDay());
            const [tasks, setTasks] = useState(generateInitialRoutine());
            const [history, setHistory] = useState({});
            const [view, setView] = useState('FLOW');
            const [modalOpen, setModalOpen] = useState(false);
            const [snoozeModal, setSnoozeModal] = useState({ open: false, task: null });
            const [editingTask, setEditingTask] = useState(null);
            const [toast, setToast] = useState({ msg: null, type: 'neutral', action: null });
            
            // Tutorial & Modals
            const [tutorialStep, setTutorialStep] = useState(0);
            const [showPermissionModal, setShowPermissionModal] = useState(false);
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            const workerRef = useRef(null);
            const [sentNotifications, setSentNotifications] = useState({});

            // Initialization & Service Worker
            useEffect(() => {
                const blob = new Blob([backgroundWorkerCode], { type: "application/javascript" });
                const worker = new Worker(URL.createObjectURL(blob));
                workerRef.current = worker;

                worker.onmessage = (e) => {
                    if (e.data.type === 'TRIGGER_NOTIFICATION') {
                        const { title, body, key } = e.data;
                        if (!sentNotifications[key]) {
                            showNotification(title, body, key);
                            setSentNotifications(prev => {
                                const newVal = { ...prev, [key]: true };
                                worker.postMessage({ type: 'SYNC_SENT_LOG', payload: newVal });
                                return newVal;
                            });
                        }
                    }
                };

                return () => worker.terminate();
            }, []);

            useEffect(() => {
                if (workerRef.current) workerRef.current.postMessage({ type: 'UPDATE_SCHEDULE', payload: tasks });
            }, [tasks]);

            useEffect(() => {
                const initSystem = async () => {
                    try {
                        const savedData = await neuralDB.load('corthon_core');
                        if (savedData) {
                            setXp(savedData.xp || 0);
                            setStreak(savedData.streak || 0);
                            setTasks({ ...generateInitialRoutine(), ...savedData.tasks });
                            setHistory(savedData.history || {});
                        } else {
                            const localData = localStorage.getItem('corthon_pro_v2');
                            if(localData) {
                                const parsed = JSON.parse(localData);
                                setXp(parsed.xp || 0);
                                setStreak(parsed.streak || 0);
                                setTasks(parsed.tasks || generateInitialRoutine());
                                setHistory(parsed.history || {});
                            }
                        }
                    } catch (e) { console.error("Boot Failure:", e); }

                    const hasCompletedTutorial = localStorage.getItem('corthon_tut_v2');
                    if (!hasCompletedTutorial) setTimeout(() => setTutorialStep(1), 3500);

                    if ('Notification' in window && Notification.permission === 'default') {
                         setTimeout(() => setShowPermissionModal(true), 4500);
                    }
                };
                initSystem();
            }, []);

            useEffect(() => {
                if (!mounted) return;
                const saveData = async () => {
                    const coreData = { xp, streak, tasks, history };
                    await neuralDB.save('corthon_core', coreData);
                    localStorage.setItem('corthon_pro_v2', JSON.stringify(coreData)); 
                };
                const timeout = setTimeout(saveData, 1000);
                return () => clearTimeout(timeout);
            }, [xp, streak, tasks, history, mounted]);

            const showNotification = (title, body, tag) => {
                if (!('Notification' in window) || Notification.permission !== 'granted') return;
                if (navigator.serviceWorker && navigator.serviceWorker.ready) {
                     navigator.serviceWorker.ready.then(reg => {
                         reg.showNotification(title, { body, icon: "icon-192.png", vibrate: [200, 100, 200], tag });
                     });
                 } else {
                     new Notification(title, { body, icon: "icon-192.png" });
                 }
                 playSound('click');
            };

            const requestNotificationAccess = () => {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        playSound('success');
                        showToast("SİNYAL HATTI AÇIK", "success");
                    } else {
                        showToast("BAĞLANTI REDDEDİLDİ", "warning");
                    }
                    setShowPermissionModal(false);
                });
            };

            const showToast = (msg, type = 'success', action = null) => {
                setToast({ msg, type, action });
                setTimeout(() => setToast({ msg: null, type: 'neutral', action: null }), 4000);
            };

            const nextTutorialStep = () => {
                if (tutorialStep < 6) { setTutorialStep(prev => prev + 1); playSound('click'); } 
                else { finishTutorial(); }
            };

            const finishTutorial = () => {
                setTutorialStep(0);
                localStorage.setItem('corthon_tut_v2', 'true');
                playSound('success');
            };

            const todayStr = new Date().toISOString().split('T')[0];
            
            // Calculate today's *earned* XP for Reward Unlocks
            const todaysEarnedXP = useMemo(() => {
                const histData = history[todayStr];
                if (!histData || !histData.categories) return 0;
                // Roughly estimate earned XP from completed tasks today
                let earned = 0;
                const tasksToday = tasks[new Date().getDay()] || [];
                tasksToday.forEach(t => {
                    if (t.completed && t.type !== 'REWARD') {
                        earned += TASK_TYPES.find(x => x.id === t.type)?.xp || 75;
                    }
                });
                return earned;
            }, [tasks, history, todayStr]);

            const isRewardUnlocked = todaysEarnedXP >= DAILY_XP_UNLOCK_THRESHOLD;

            const handleSaveTask = (taskData) => {
                setTasks(prev => {
                    const dayTasks = [...(prev[selectedDayId] || [])];
                    if (editingTask) {
                        const idx = dayTasks.findIndex(t => t.id === editingTask.id);
                        if (idx !== -1) dayTasks[idx] = { ...dayTasks[idx], ...taskData };
                    } else {
                        dayTasks.push({ id: Date.now().toString(), completed: false, snoozed: 0, snoozePenalty: 0, ...taskData });
                    }
                    // Sort: TimeBound first (sorted by time), then non-timeBound
                    dayTasks.sort((a, b) => {
                        if (a.timeBound && !b.timeBound) return -1;
                        if (!a.timeBound && b.timeBound) return 1;
                        if (a.timeBound && b.timeBound) return a.time.localeCompare(b.time);
                        return 0;
                    });
                    return { ...prev, [selectedDayId]: dayTasks };
                });
                setModalOpen(false); setEditingTask(null); playSound('complete');
            };

            const openSnoozeModal = (task) => setSnoozeModal({ open: true, task });
            
            const handleSnoozeConfirm = (reason) => {
                const { task } = snoozeModal;
                setTasks(prev => {
                    const dayTasks = [...(prev[selectedDayId] || [])];
                    const idx = dayTasks.findIndex(t => t.id === task.id);
                    if (idx === -1) return prev;
                    dayTasks[idx] = { ...dayTasks[idx], snoozed: (dayTasks[idx].snoozed || 0) + 1, snoozePenalty: (dayTasks[idx].snoozePenalty || 0) + reason.penalty };
                    return { ...prev, [selectedDayId]: dayTasks };
                });
                if (reason.penalty > 0) {
                    setXp(x => Math.max(0, x - reason.penalty));
                    playSound(reason.id === 'LAZY' ? 'lazy' : 'warning');
                    
                    // Geri Al action in Toast
                    showToast(`KORTİZOL SIZINTISI: -${reason.penalty} XP`, "warning", {
                        label: 'GERİ AL',
                        onClick: () => undoSnoozeDirectly(task.id, selectedDayId, reason.penalty)
                    });
                } else { playSound('mercy'); showToast("MERHAMET PROTOKOLÜ: Ceza Yok", "system"); }
                setSnoozeModal({ open: false, task: null });
            };

            const undoSnoozeDirectly = (taskId, dayId, penaltyToRestore) => {
                setTasks(prev => {
                    const dayTasks = [...(prev[dayId] || [])];
                    const idx = dayTasks.findIndex(t => t.id === taskId);
                    if (idx !== -1) {
                        dayTasks[idx].snoozed = Math.max(0, dayTasks[idx].snoozed - 1);
                        dayTasks[idx].snoozePenalty = Math.max(0, dayTasks[idx].snoozePenalty - penaltyToRestore);
                    }
                    return { ...prev, [dayId]: dayTasks };
                });
                setXp(x => x + penaltyToRestore);
                playSound('success');
                showToast("İRADE KURTARILDI", "success");
            };

            const handleReschedule = (targetDayId) => {
                 const { task } = snoozeModal;
                 setTasks(prev => {
                    const currentDayTasks = prev[selectedDayId].filter(t => t.id !== task.id);
                    const targetDayTasks = [...(prev[targetDayId] || [])];
                    targetDayTasks.push({ ...task, snoozed: 0, snoozePenalty: 0 }); 
                    return { ...prev, [selectedDayId]: currentDayTasks, [targetDayId]: targetDayTasks };
                 });
                 setXp(x => Math.max(0, x - 250)); playSound('warning');
                 showToast("PLANLAMA HATASI (-250 XP)", "warning");
                 setSnoozeModal({ open: false, task: null });
            };

            const toggleTask = (taskId) => {
                setTasks(prev => {
                    const dayTasks = [...(prev[selectedDayId] || [])];
                    const idx = dayTasks.findIndex(t => t.id === taskId);
                    if (idx === -1) return prev;
                    const task = dayTasks[idx];

                    // Kilit kontrolü
                    if (task.type === 'REWARD' && !task.completed && !isRewardUnlocked) {
                        playSound('warning');
                        showToast("DOPAMİN KİLİDİ: Önce zorunlu işleri hallet.", "warning");
                        return prev; // State'i değiştirme
                    }

                    const newStatus = !task.completed;
                    const points = TASK_TYPES.find(i => i.id === task.type)?.xp || 50;
                    
                    if (newStatus) {
                        setXp(x => x + points);
                        if(task.type === 'REWARD') playSound('unlock'); else playSound('success');
                        showToast(`DOPAMİN ENJEKTE EDİLDİ (+${points} XP)`, "success");
                    } else {
                        setXp(x => Math.max(0, x - points));
                        playSound('purge');
                        showToast(`GERİ ALINDI (-${points} XP)`, "danger");
                    }
                    dayTasks[idx] = { ...task, completed: newStatus };
                    return { ...prev, [selectedDayId]: dayTasks };
                });
            };

            const deleteTask = (taskId) => {
                setTasks(prev => {
                    const newState = { ...prev };
                    Object.keys(newState).forEach(key => {
                        newState[key] = newState[key].filter(t => String(t.id) !== String(taskId));
                    });
                    return newState;
                });
                setModalOpen(false); setEditingTask(null); playSound('purge'); 
                showToast("VERİ İMHA EDİLDİ", "danger");
            };

            const level = Math.floor(Math.sqrt(xp / XP_DIFFICULTY_SCALAR)) + 1;
            const nextLevelXp = Math.pow(level, 2) * XP_DIFFICULTY_SCALAR;
            const currentLevelBaseXp = Math.pow(level - 1, 2) * XP_DIFFICULTY_SCALAR;
            const progressPercent = Math.min(100, Math.max(0, ((xp - currentLevelBaseXp) / (nextLevelXp - currentLevelBaseXp)) * 100));
            
            const userTitle = getTitle(level);
            const todayTasks = tasks[selectedDayId] || [];

            if (!mounted) return <BootScreen onComplete={() => setMounted(true)} />;

            return (
                <div className="min-h-screen pb-36 safe-area-bottom">
                    {tutorialStep > 0 && <div className="fixed inset-0 z-[50] bg-black/60 backdrop-blur-sm transition-opacity duration-500"></div>}
                    <TutorialOverlay step={tutorialStep} onNext={nextTutorialStep} onSkip={finishTutorial} />
                    {showPermissionModal && <PermissionModal onGrant={requestNotificationAccess} onSkip={() => setShowPermissionModal(false)} isIOS={isIOS} />}

                    {/* App Header */}
                    <div className="bg-[#1a1a1c]/95 backdrop-blur-xl sticky top-0 z-30 border-b border-white/5 safe-area-top shadow-xl shadow-black/80">
                        <div className="px-5 py-4 flex justify-between items-center">
                            <h1 className="font-bold tracking-tight text-lg flex items-center gap-3 font-sans"><CorthonLogo /><span className="text-white tracking-widest">CORTHON</span></h1>
                            <div className="flex items-center gap-4">
                                <div className={`flex flex-col items-end transition-all duration-500 ${tutorialStep === 2 ? 'tutorial-highlight p-2 bg-[#232325]' : ''}`}>
                                    <div className="flex items-center gap-2 text-[10px] uppercase font-bold text-gray-400 font-mono tracking-widest">{userTitle}</div>
                                    <div className="flex items-center gap-2 text-xs font-bold text-white font-mono mt-0.5">LVL {level} <span className="text-corthon-cyan">{xp} XP</span></div>
                                    <div className="w-24 h-1.5 bg-[#151516] rounded-full mt-1.5 overflow-hidden border border-white/5"><div className="h-full bg-gradient-to-r from-corthon-cyan to-corthon-emerald transition-all duration-1000 ease-out" style={{width: `${progressPercent}%`}}></div></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="px-5 pt-6 max-w-2xl mx-auto">
                        {view === 'FLOW' && (
                            <div className="animate-slide-up">
                                <Greeting />
                                
                                <div className={`flex justify-between mb-8 overflow-x-auto pb-2 scrollbar-hide -mx-5 px-5 transition-all duration-500 ${tutorialStep === 3 ? 'tutorial-highlight py-2 bg-[#1a1a1c]' : ''}`}>
                                    {DAYS.map(d => {
                                        const isSelected = d.id === selectedDayId;
                                        const isToday = d.id === new Date().getDay();
                                        return (
                                            <button 
                                                key={d.id} 
                                                onClick={() => { setSelectedDayId(d.id); playSound('click'); }}
                                                className={`flex flex-col items-center min-w-[3.5rem] py-2 rounded-xl transition-all ${isSelected ? 'bg-[#151516] text-white shadow-[0_0_15px_rgba(185,133,81,0.15)] border border-corthon-cyan/30 scale-105' : 'bg-transparent text-gray-500 hover:bg-white/5 border border-transparent'}`}
                                            >
                                                <span className={`text-xs font-bold mb-1 ${isSelected ? 'text-corthon-cyan' : ''}`}>{d.short}</span>
                                                {isToday && <div className={`w-1 h-1 rounded-full ${isSelected ? 'bg-corthon-cyan shadow-[0_0_5px_#b98551]' : 'bg-gray-600'}`}></div>}
                                            </button>
                                        );
                                    })}
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-end mb-4 border-b border-white/5 pb-2">
                                        <h2 className="text-lg font-bold text-gray-300 tracking-wide uppercase">{DAYS.find(d => d.id === selectedDayId).name} PROTOKOLÜ</h2>
                                        <span className="text-xs text-corthon-cyan font-mono font-bold">
                                            {todayTasks.filter(t=>t.completed).length} / {todayTasks.length}
                                        </span>
                                    </div>

                                    {todayTasks.length === 0 ? (
                                        <div onClick={() => { setEditingTask(null); setModalOpen(true); }} className="border border-dashed border-white/10 rounded-2xl p-10 text-center text-gray-500 hover:bg-[#1a1a1c] hover:border-corthon-cyan/30 cursor-pointer transition-all group">
                                            <Terminal className="mx-auto mb-3 opacity-30 group-hover:opacity-100 group-hover:text-corthon-cyan transition-all" size={32}/>
                                            <p className="text-sm font-medium tracking-wide">Protokol boş.</p>
                                            <p className="text-xs mt-1 text-gray-600">Sisteme görev tanımlamak için tıkla.</p>
                                        </div>
                                    ) : (
                                        todayTasks.map(task => {
                                            const typeInfo = TASK_TYPES.find(i => i.id === task.type);
                                            const isReward = task.type === 'REWARD';
                                            const locked = isReward && !isRewardUnlocked && !task.completed;

                                            return (
                                                <div 
                                                    key={task.id}
                                                    onClick={() => !task.completed && toggleTask(task.id)}
                                                    className={`group glass-panel rounded-xl p-4 transition-all cursor-pointer border-l-4 
                                                        ${task.completed ? 'opacity-40 grayscale border-l-gray-800' : 
                                                        locked ? 'border-l-gray-600 bg-[#151516]/50' : 
                                                        `hover:border-corthon-cyan hover:shadow-[0_0_20px_rgba(185,133,81,0.1)] border-l-${typeInfo.color.split('-')[1]}-500`}`}
                                                >
                                                    <div className="flex items-start gap-4">
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); toggleTask(task.id); }}
                                                            className={`mt-1 w-6 h-6 rounded border-2 flex items-center justify-center transition-colors 
                                                                ${task.completed ? 'bg-corthon-cyan border-corthon-cyan text-black' : 
                                                                locked ? 'border-gray-700 bg-gray-900 text-gray-600' :
                                                                'border-gray-500 hover:border-corthon-cyan text-transparent'}`}
                                                        >
                                                            {locked ? <Lock size={12}/> : <Check size={14} strokeWidth={3} />}
                                                        </button>
                                                        
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                                                                {task.timeBound ? (
                                                                    <span className="text-[10px] font-mono text-gray-400 bg-black/50 px-1.5 py-0.5 rounded border border-white/5 flex items-center gap-1"><Clock size={10}/> {task.time}</span>
                                                                ) : (
                                                                    <span className="text-[10px] font-mono text-gray-500 px-1 flex items-center gap-1"><Sparkles size={10}/></span>
                                                                )}
                                                                <span className="text-[9px] uppercase tracking-wider text-gray-400 font-bold">{task.category}</span>
                                                                
                                                                {isReward && (
                                                                    <span className={`text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded font-bold border flex items-center gap-1
                                                                        ${locked ? 'border-gray-700 text-gray-600' : 'border-corthon-cyan/50 text-corthon-cyan bg-corthon-cyan/10 animate-pulse'}`}>
                                                                        <Unlock size={10}/> DOPAMİN ÖDÜLÜ
                                                                    </span>
                                                                )}
                                                                
                                                                {task.snoozed > 0 && <span className="text-[9px] uppercase tracking-wider text-corthon-orange border border-corthon-orange/30 bg-corthon-orange/10 px-1.5 py-0.5 rounded font-bold flex items-center gap-1"><Hourglass size={10} /> ERTELENDİ x{task.snoozed}</span>}
                                                            </div>
                                                            <h3 className={`font-bold text-base truncate mb-1 ${task.completed ? 'line-through text-gray-600' : locked ? 'text-gray-500' : 'text-gray-100'}`}>{task.title}</h3>
                                                            {task.note && <p className="text-xs text-gray-500 line-clamp-2 leading-relaxed font-sans mt-1">{task.note}</p>}
                                                        </div>

                                                        <div className="flex flex-col gap-1">
                                                            <button onClick={(e) => { e.stopPropagation(); setEditingTask(task); setModalOpen(true); }} className="p-2 text-gray-600 hover:text-white transition-colors bg-[#151516] rounded-lg hover:bg-white/10"><Edit3 size={14} /></button>
                                                            {!locked && <button onClick={(e) => { e.stopPropagation(); openSnoozeModal(task); }} className="p-2 text-corthon-warning hover:text-white transition-colors bg-corthon-warning/5 rounded-lg hover:bg-corthon-warning/20 border border-corthon-warning/10"><History size={14} /></button>}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Floating Add Button */}
                    {view === 'FLOW' && (
                        <button 
                            onClick={() => { setEditingTask(null); setModalOpen(true); playSound('click'); }} 
                            className={`fixed bottom-8 right-6 w-14 h-14 bg-corthon-cyan text-black rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(185,133,81,0.4)] hover:scale-105 active:scale-95 transition-all z-40 ${tutorialStep === 4 ? 'tutorial-highlight' : ''}`}
                        >
                            <Plus size={28} strokeWidth={2.5} />
                        </button>
                    )}

                    {/* Enhanced Toast with Action (Undo) */}
                    {toast.msg && (
                        <div className={`fixed top-safe mt-4 left-4 right-4 sm:left-1/2 sm:right-auto sm:-translate-x-1/2 sm:w-auto max-w-md p-4 rounded-xl font-bold text-sm shadow-2xl animate-slide-up z-[100] flex items-center gap-3 border backdrop-blur-xl
                            ${toast.type === 'success' ? 'bg-corthon-emerald/90 text-black border-corthon-emerald' : ''} 
                            ${toast.type === 'danger' ? 'bg-red-500/90 text-white border-red-400' : ''} 
                            ${toast.type === 'warning' ? 'bg-corthon-warning/90 text-black border-yellow-400' : ''} 
                            ${toast.type === 'system' ? 'bg-[#1a1a1c]/95 text-white border-white/20' : ''}`}
                        >
                            {toast.type === 'success' && <Zap size={18} className="shrink-0"/>}
                            {toast.type === 'danger' && <AlertTriangle size={18} className="shrink-0"/>}
                            {toast.type === 'warning' && <History size={18} className="shrink-0"/>}
                            {toast.type === 'system' && <Database size={18} className="shrink-0 text-corthon-cyan"/>}
                            <span className="flex-1 leading-tight tracking-wide">{toast.msg}</span>
                            
                            {toast.action && (
                                <button 
                                    onClick={toast.action.onClick}
                                    className="ml-2 px-3 py-1.5 bg-black/20 hover:bg-black/40 rounded border border-black/10 text-xs tracking-wider transition-colors"
                                >
                                    {toast.action.label}
                                </button>
                            )}
                        </div>
                    )}

                    <TaskEditor isOpen={modalOpen} onClose={() => setModalOpen(false)} onSave={handleSaveTask} onDelete={deleteTask} initialData={editingTask} />
                    <SnoozeModal isOpen={snoozeModal.open} task={snoozeModal.task} onClose={() => setSnoozeModal({ open: false, task: null })} onConfirm={handleSnoozeConfirm} onReschedule={handleReschedule} onUndo={() => undoSnoozeDirectly(snoozeModal.task.id, selectedDayId, snoozeModal.task.snoozePenalty)} />
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
